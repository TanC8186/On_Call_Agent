services:
  # ═══════════════════════════════════════════════════════════
  # Milvus 向量数据库（etcd + minio + standalone）
  # ═══════════════════════════════════════════════════════════
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 60s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.5
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════
  # On-Call Agent 主应用
  # ═══════════════════════════════════════════════════════════
  app:
    container_name: oncall-agent
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9900:9900"
    environment:
      # ── Milvus（Docker 内部网络地址） ──
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_TIMEOUT=10000

      # ── MCP 服务（同容器内 localhost） ──
      - MCP_CLS_TRANSPORT=streamable-http
      - MCP_CLS_URL=http://localhost:8003/mcp
      - MCP_MONITOR_TRANSPORT=streamable-http
      - MCP_MONITOR_URL=http://localhost:8004/mcp
      - MCP_SSH_TRANSPORT=streamable-http
      - MCP_SSH_URL=http://localhost:8005/mcp

      # ── Embedding 模型 ──
      - EMBEDDING_PROVIDER=local
      - EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - EMBEDDING_API_KEY=
      - HF_ENDPOINT=https://hf-mirror.com

      # ── 以下从 .env 或宿主机环境继承 ──
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - TENCENTCLOUD_SECRET_ID=${TENCENTCLOUD_SECRET_ID:-}
      - TENCENTCLOUD_SECRET_KEY=${TENCENTCLOUD_SECRET_KEY:-}
      - TENCENTCLOUD_REGION=${TENCENTCLOUD_REGION:-ap-beijing}
      - SSH_HOST=${SSH_HOST:-}
      - SSH_PORT=${SSH_PORT:-22}
      - SSH_USER=${SSH_USER:-Administrator}
      - SSH_KEY_FILE=${SSH_KEY_FILE:-/app/ssh_key.pem}
      - SSH_SERVER_TYPE=${SSH_SERVER_TYPE:-windows}
    volumes:
      # 挂载 HuggingFace 模型缓存（避免重复下载）
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface:rw
      # 挂载 SSH 私钥（如不需要 SSH 功能可删除此行）
      - ${SSH_KEY_FILE:-/dev/null}:/app/ssh_key.pem:ro
    depends_on:
      milvus:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: oncall-agent-net
